function st(t){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.ti').forEach(x=>x.classList.remove('active'));document.getElementById('p-'+t).classList.add('active');document.querySelector('.ti[data-tab="'+t+'"]').classList.add('active');}

function rNB(){var b=document.getElementById('nbar');b.innerHTML='';NCATS.forEach(c=>{var x=document.createElement('button');x.className='nb'+(c.id===NCUR?' active':'');x.textContent=c.tag;x.onclick=()=>{NCUR=c.id;rNB();rNL();};b.appendChild(x);});document.getElementById('ncnt').textContent=NDATA.filter(n=>n.c===NCUR).length+'篇';}

function rNL(){var l=document.getElementById('nlist');var items=NDATA.filter(n=>n.c===NCUR);l.innerHTML='';items.forEach(n=>{var d=document.createElement('div');d.className='ncrd';var img='https://images.unsplash.com/'+n.i+'?w=600&q=80';d.innerHTML='<img class="nimg" src="'+img+'" alt="" loading="lazy" onerror="this.style.display='none'"><div class="nbd"><span class="ntag '+n.cls+'">'+n.tag+'</span><div class="nti">'+n.t+'</div><div class="nsu">'+n.s+'</div><div class="nmt"><span>'+n.st+'</span></div></div>';l.appendChild(d);});}

function rPT(){var b=document.getElementById('ptabs');b.innerHTML='';PCATS.forEach(c=>{var x=document.createElement('button');x.className='pb'+(c.id===PCUR?' active':'');x.textContent=c.tag;x.onclick=()=>{PCUR=c.id;rPT();rPG();};b.appendChild(x);});}

function rPG(){var g=document.getElementById('pgrid');g.innerHTML='';(PDATA[PCUR]||[]).forEach(p=>{var d=document.createElement('div');d.className='pi';var img='https://images.unsplash.com/photo-'+p.i+'?w=400&q=80';d.innerHTML='<img src="'+img+'" alt="" loading="lazy" onerror="this.style.display='none'">';g.appendChild(d);});}

function unc(){document.getElementById('ncc').textContent=document.getElementById('ni').value.length+'/500';}

function subn(){var t=document.getElementById('ni').value.trim();if(!t){alert('内容不能为空');return;}var notes=JSON.parse(localStorage.getItem('vzn')||'[]');notes.unshift({id:'n'+Date.now(),content:t,name:'匿名用户',time:Date.now()});localStorage.setItem('vzn',JSON.stringify(notes));renderNotes(notes);document.getElementById('ni').value='';document.getElementById('ncc').textContent='0/500';}

function renderNotes(notes){document.getElementById('nocnt').textContent=notes.length+'条';var l=document.getElementById('nlist2');l.innerHTML='';if(notes.length===0){l.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--t3)">暂无纸条</div>';return;}notes.forEach(n=>{var d=document.createElement('div');d.className='nd';d.innerHTML='<div class="na"><div class="av" style="background:'+['#667eea','#764ba2','#f093fb','#00d2ff','#ff6b9d','#00f5d4','#f59e0b','#10b981'][Math.floor(Math.random()*8)]+'">'+n.name.charAt(0)+'</div><div class="nn">'+n.name+'</div></div><div class="nc4">'+n.content+'</div><div class="nt2">'+new Date(n.time).toLocaleString()+'</div>';l.appendChild(d);});}

function renderGames(){var g=document.getElementById('glist');g.innerHTML='';GAMES.forEach((game,idx)=>{var d=document.createElement('div');d.className='gc';var c=document.createElement('canvas');c.width=100;c.height=100;var ctx=c.getContext('2d');ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,100,100);ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(game.name,50,50);d.appendChild(c);var n=document.createElement('div');n.className='gi';n.innerHTML='<div class="gn">'+game.name+'</div>';d.appendChild(n);g.appendChild(d);});}

function renderResources(){var resources=[{icon:'🔗',name:'GitHub',url:'https://github.com'},{icon:'🎨',name:'Figma',url:'https://figma.com'},{icon:'📸',name:'Unsplash',url:'https://unsplash.com'},{icon:'🌐',name:'Google',url:'https://google.com'}];var rlist=document.getElementById('rlist');rlist.innerHTML='';resources.forEach(res=>{var d=document.createElement('a');d.className='rc2';d.href=res.url;d.target='_blank';d.innerHTML='<div class="ri">'+res.icon+'</div><div class="ri2"><div class="rn">'+res.name+'</div></div>';rlist.appendChild(d);});}

function kf(){var fb=document.getElementById('fb');fb.classList.remove('kf');void fb.offsetWidth;fb.classList.add('kf');var m=parseInt(localStorage.getItem('merit')||'0')+1;localStorage.setItem('merit',m);document.getElementById('mn').textContent=m;var t=document.getElementById('toast');t.textContent='功德+1';t.classList.add('s');setTimeout(()=>t.classList.remove('s'),2200);}

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('s');setTimeout(()=>t.classList.remove('s'),2200);}
